<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upstox Live Price on Firebase</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        .price { font-size: 40px; font-weight: bold; color: #2ec4b6; margin: 20px 0; }
        .btn { background-color: #011627; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="symbol">Loading...</h1>
        <p>Firebase Live Price</p>
        <div class="price" id="ltp">₹--.--</div>
        <button class="btn" onclick="fetchPrice()">Refresh Price</button>
    </div>

    <script>
      // ⚠️ YAHA APNA UPSTOX ACCESS TOKEN DALEIN
const ACCESS_TOKEN = "eyJ0eXAiOiJKV1QiLCJrZXlfaWQiOiJza192MS4wIiwiYWxnIjoiSFMyNTYifQ.eyJzdWIiOiIyQUEyTkQiLCJqdGkiOiI2YTMyY2MwN2IwYTIwZDM2MWRlZDlkZTYiLCJpc011bHRpQ2xpZW50IjpmYWxzZSwiaXNQbHVzUGxhbiI6dHJ1ZSwiaWF0IjoxNzgxNzEzOTI3LCJpc3MiOiJ1ZGFwaS1nYXRld2F5LXNlcnZpY2UiLCJleHAiOjE3ODE3MzM2MDB9.tJD6dHkBs1GQMSVecLJ0N_q6TI9GbYqlEybDtSFQD4U"; 
const INSTRUMENT_KEY = "NSE_EQ|INE002A01018"; // Reliance

async function fetchPrice() {
    const ltpElement = document.getElementById('ltp');
    ltpElement.innerText = "Fetching...";
    
    // Upstox LTP API ke liye direct key pass karke dekhte hain bina manually encode kiye URL string me
    const url = `https://api.upstox.com/v2/market-quote/ltp?instrument_key=${INSTRUMENT_KEY}`;

    try {
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'Accept': 'application/json',
                'Authorization': `Bearer ${ACCESS_TOKEN}`
            }
        });

        if (response.ok) {
            const data = await response.json();
            
            // Upstox ka response format: data: { "NSE_EQ:RELIANCE": { last_price: 2500 } }
            // Yahan dhyan dein: key me '|' ki jagah ':' hokar aata hai response me!
            const responseKey = "NSE_EQ:RELIANCE"; // Ya fir dynamically check karein
            
            // Dynamically pehli key pakadte hain jo response me aayi hai
            const actualKey = Object.keys(data.data)[0]; 
            const price = data.data[actualKey].last_price;

            document.getElementById('symbol').innerText = actualKey.replace(':', '|');
            ltpElement.innerText = `₹${price}`;
        } else {
            // Agar abhi bhi error aaye toh exact status code pata chalega
            const errorData = await response.json();
            console.log("Upstox Error Response:", errorData);
            ltpElement.innerText = `Error ${response.status}`;
        }
    } catch (error) {
        ltpElement.innerText = "Error!";
        console.error(error);
    }
}
fetchPrice();
    </script>
</body>
</html>
